name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          mkdir dist
          GOOS=linux GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/slopgate-linux-amd64 ./cmd/slopgate
          GOOS=darwin GOARCH=amd64 go build -buildvcs=false -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/slopgate-darwin-amd64 ./cmd/slopgate
          GOOS=darwin GOARCH=arm64 go build -buildvcs=false -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/slopgate-darwin-arm64 ./cmd/slopgate

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true